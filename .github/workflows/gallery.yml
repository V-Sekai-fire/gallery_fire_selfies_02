name: Build and deploy gallery

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build gallery with thumbsup
        run: |
          docker run --rm \
            -v "$(pwd)":/work \
            -w /work \
            thumbsupgallery/thumbsup:latest \
            thumbsup --config config.json
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build_output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
